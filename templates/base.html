<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}WINK — What I Need to Know{% endblock %}</title>
  <style>
    /* ── WINK Design System ── */
    :root {
      --navy:       #002855;
      --orange:     #FF8200;
      --dark-bg:    #0a1628;
      --light-bg:   #f4f6fb;
      --white:      #ffffff;
      --gray-text:  #444455;
      --muted:      #6b7a99;
      --border:     #dde3f0;
      --card-bg:    #ffffff;
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  16px;
      --shadow-sm:  0 1px 4px rgba(0,40,85,0.08);
      --shadow-md:  0 4px 16px rgba(0,40,85,0.10);
      --shadow-lg:  0 8px 32px rgba(0,40,85,0.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--light-bg);
      color: var(--gray-text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Inner Page Nav ── */
    .app-nav {
      background: var(--navy);
      padding: 0 32px;
      display: flex;
      align-items: center;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .app-nav .nav-logo {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      text-decoration: none;
      margin-right: 8px;
    }
    .app-nav .nav-logo span { color: var(--orange); }
    .app-nav .nav-divider {
      width: 1px; height: 24px;
      background: rgba(255,255,255,0.2);
      margin: 0 20px;
    }
    .app-nav .nav-links {
      display: flex; align-items: center; gap: 4px; flex: 1;
    }
    .app-nav .nav-links a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      transition: background 0.15s, color 0.15s;
    }
    .app-nav .nav-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .app-nav .nav-links a.active { background: var(--orange); color: #fff; }
    .app-nav .nav-right {
      display: flex; align-items: center; gap: 12px; margin-left: auto;
    }
    .app-nav .nav-user {
      font-size: 13px; color: rgba(255,255,255,0.65);
    }
    .app-nav .nav-user strong { color: #fff; }
    .app-nav .btn-logout {
      font-size: 13px; color: rgba(255,255,255,0.65);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      transition: all 0.15s;
    }
    .app-nav .btn-logout:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Page Shell ── */
    .page-shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 64px;
    }
    .page-header {
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.2;
    }
    .page-header p {
      margin-top: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Cards ── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 24px;
    }
    .card-orange-top { border-top: 3px solid var(--orange); }
    .card-navy-top   { border-top: 3px solid var(--navy); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 14px; font-weight: 600;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      border: none; cursor: pointer;
      text-decoration: none;
      transition: all 0.18s;
      line-height: 1;
    }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover { background: #e57200; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,130,0,0.3); }
    .btn-navy   { background: var(--navy); color: #fff; }
    .btn-navy:hover { background: #003570; }
    .btn-ghost  { background: transparent; color: var(--navy); border: 1.5px solid var(--navy); }
    .btn-ghost:hover { background: var(--navy); color: #fff; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }

    /* ── Forms ── */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--navy); margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--gray-text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--orange); }

    /* ── Alerts ── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .alert-danger { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }

    /* ── Stats Row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      padding: 20px 20px 18px;
      border-top: 3px solid var(--orange);
    }
    .stat-card .stat-value {
      font-size: 30px; font-weight: 800;
      color: var(--navy); line-height: 1;
    }
    .stat-card .stat-label {
      font-size: 12px; color: var(--muted);
      margin-top: 4px; text-transform: uppercase; letter-spacing: .05em;
    }

    /* ── Table ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      background: var(--navy); color: #fff;
      padding: 10px 14px; text-align: left;
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .data-table th:first-child { border-radius: 8px 0 0 0; }
    .data-table th:last-child  { border-radius: 0 8px 0 0; }
    .data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .data-table tr:hover td { background: #f8f9ff; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 999px;
    }
    .badge-orange { background: #fff3e6; color: var(--orange); }
    .badge-navy   { background: #e8edf5; color: var(--navy); }
    .badge-green  { background: #f0fdf4; color: #166534; }
    .badge-red    { background: #fef2f2; color: #dc2626; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
