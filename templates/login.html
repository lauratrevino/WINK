    /* Subtle right-side veil so white card floats cleanly */
    .page-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        100deg,
        transparent            0%,
        transparent           48%,
        rgba(255,255,255,0.08) 58%,
        rgba(255,255,255,0.22) 72%,
        rgba(255,255,255,0.30) 100%
      );
      z-index: 1;
    }

    /* Form positioned right side over the open desk/window area */
    .form-wrap {
      position: absolute;
      top: 50%;
      right: 5%;
      transform: translateY(-50%);
      z-index: 2;
      width: 100%;
      max-width: 390px;
    }

    /* WINK above the card */
    .form-brand {
      text-align: center;
      margin-bottom: 12px;
    }
    .form-brand .wordmark {
      font-size: 36px; font-weight: 900;
      color: #002855; letter-spacing: -1px;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1;
      text-shadow: 0 1px 8px rgba(255,255,255,0.9);
    }
    .form-brand .brand-sub {
      font-size: 13px; font-weight: 700;
      color: #002855; opacity: 0.80;
      text-shadow: 0 1px 6px rgba(255,255,255,0.9);
    }

    .form-card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid rgba(200,215,240,0.60);
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      padding: 32px 30px;
    }

    .form-card h1 {
      font-size: 22px; font-weight: 800;
      color: #002855; margin-bottom: 4px;
    }
    .form-card .subtitle {
      font-size: 13px; color: #6b7a99; margin-bottom: 22px;
    }

    /* Tab switcher: Sign In / Change Password */
    .tab-row {
      display: flex; gap: 0;
      border: 1.5px solid #dde3f0;
      border-radius: 8px; overflow: hidden;
      margin-bottom: 22px;
    }
    .tab-btn {
      flex: 1; padding: 9px 0;
      font-size: 13px; font-weight: 700;
      background: transparent; color: #6b7a99;
      border: none; cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: #002855; color: #fff;
    }
    .tab-btn:not(.active):hover { background: #f0f4ff; color: #002855; }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: block; font-size: 13px;
      font-weight: 700; color: #002855; margin-bottom: 5px;
    }
    .form-group input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid #dde3f0; border-radius: 8px;
      font-size: 14px; color: #333;
      background: #f8f9ff; outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .form-group input:focus { border-color: #FF8200; background: #fff; }

    .btn-primary {
      width: 100%; padding: 13px;
      background: #FF8200; color: #fff;
      font-size: 15px; font-weight: 800;
      border: none; border-radius: 8px;
      cursor: pointer; transition: all 0.18s;
      margin-top: 4px; margin-bottom: 16px;
      box-shadow: 0 4px 18px rgba(255,130,0,0.40);
    }
    .btn-primary:hover { background: #e57200; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,130,0,0.50); }

    .form-alt { text-align: center; font-size: 13px; color: #6b7a99; }
    .form-alt a { color: #002855; font-weight: 700; text-decoration: none; }
    .form-alt a:hover { color: #FF8200; }

    .alert-danger {
      background: #fef2f2; border: 1px solid #fecaca;
      color: #b91c1c; border-radius: 8px;
      padding: 10px 13px; font-size: 13px; margin-bottom: 14px;
    }
    .alert-success {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      color: #166534; border-radius: 8px;
      padding: 10px 13px; font-size: 13px; margin-bottom: 14px;
    }

    .pw-hint {
      font-size: 11px; color: #9ca3af; margin-top: 4px;
    }

    .back-link {
      display: block; text-align: center;
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid #eef0f6;
      font-size: 12px; color: #9ca3af;
      text-decoration: none; transition: color 0.15s;
    }
    .back-link:hover { color: #002855; }
  </style>
</head>
<body>

  <div class="page-bg"></div>
  <div class="page-overlay"></div>

  <div class="form-wrap">

    <div class="form-brand">
      <div class="wordmark">WINK</div>
      <div class="brand-sub">(What I Need to Know)</div>
    </div>

    <div class="form-card">
      <h1>Welcome back</h1>
      <div class="subtitle">Sign in or update your password below.</div>

      {% if error %}
        <div class="alert-danger">{{ error }}</div>
      {% endif %}

      <!-- Tab switcher -->
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('signin', this)">Sign In</button>
        <button class="tab-btn" onclick="switchTab('changepw', this)">Change Password</button>
      </div>

      <!-- SIGN IN PANEL -->
      <div class="panel active" id="panel-signin">
        <form method="POST" action="/login">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email"
                   placeholder="yourname@miners.utep.edu" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="Your password" required>
          </div>
          <button type="submit" class="btn-primary">Sign In &rarr;</button>
        </form>
        <div class="form-alt">
          Don't have an account? <a href="/register">Create one for free</a>
        </div>
      </div>

      <!-- CHANGE PASSWORD PANEL -->
      <div class="panel" id="panel-changepw">
        <form method="POST" action="/change-password">
          <div class="form-group">
            <label for="cp-email">Email</label>
            <input type="email" id="cp-email" name="email"
                   placeholder="yourname@miners.utep.edu" required>
          </div>
          <div class="form-group">
            <label for="cp-current">Current Password</label>
            <input type="password" id="cp-current" name="current_password"
                   placeholder="Your current password" required>
          </div>
          <div class="form-group">
            <label for="cp-new">New Password</label>
            <input type="password" id="cp-new" name="new_password"
                   placeholder="At least 6 characters" required minlength="6">
            <div class="pw-hint">Minimum 6 characters</div>
          </div>
          <div class="form-group">
            <label for="cp-confirm">Confirm New Password</label>
            <input type="password" id="cp-confirm" name="confirm_password"
                   placeholder="Repeat new password" required minlength="6">
          </div>
          <button type="submit" class="btn-primary">Update Password &rarr;</button>
        </form>
        <div class="form-alt">
          Remember it? <a href="#" onclick="switchTabByName('signin')">Sign in instead</a>
        </div>
      </div>

      <a href="/" class="back-link">&larr; Back to home</a>
    </div>

  </div>

  <script>
    function switchTab(name, btn) {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("panel-" + name).classList.add("active");
    }
    function switchTabByName(name) {
      const btn = document.querySelector('.tab-btn[onclick*="' + name + '"]');
      if (btn) switchTab(name, btn);
    }
  </script>

</body>
</html>
