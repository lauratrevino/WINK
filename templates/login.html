    /* Gradient: left stays mostly clear so bg image shows strongly,
       right becomes fully solid navy so form is crisp */
    .page-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        100deg,
        rgba(240,245,255,0.22) 0%,
        rgba(235,241,255,0.30) 25%,
        rgba(10,30,70,0.55)    45%,
        rgba(0,20,60,0.82)     60%,
        rgba(0,16,50,0.95)     75%,
        rgba(0,12,44,1.00)    100%
      );
      z-index: 1;
    }

    .layout {
      position: relative; z-index: 2;
      display: flex; height: 100vh; align-items: stretch;
    }

    /* LEFT — branding over the visible background */
    .left-panel {
      flex: 0 0 48%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 36px; text-align: center;
    }

    .left-headline-1 {
      font-size: clamp(16px, 2vw, 26px);
      font-weight: 900; text-transform: uppercase;
      color: #002855; letter-spacing: -0.3px;
      line-height: 1.05; margin-bottom: 2px;
    }
    .left-headline-2 {
      font-size: clamp(16px, 2vw, 26px);
      font-weight: 900; text-transform: uppercase;
      color: #FF8200; letter-spacing: -0.3px;
      line-height: 1.05;
      margin-bottom: clamp(16px, 2.2vw, 28px);
    }
    .left-wordmark {
      font-size: 36px; font-weight: 900;
      color: #002855; letter-spacing: -1px;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1; margin-bottom: 2px;
    }
    .left-sub {
      font-size: clamp(12px, 1.3vw, 17px);
      font-weight: 700; color: #002855;
      opacity: 0.80; margin-bottom: clamp(14px, 2vw, 24px);
    }
    .left-character {
      width: 62%; max-width: 260px;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,40,85,0.18);
      margin-bottom: 12px;
    }
    .left-character img { width: 100%; height: auto; display: block; }
    .left-caption { font-size: clamp(11px,1vw,13px); color: #6b7a99; font-weight: 600; }

    /* RIGHT — solid dark navy panel, form floats on top */
    .right-panel {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 32px; overflow-y: auto;
    }

    .form-card {
      width: 100%; max-width: 420px;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid rgba(200,215,240,0.50);
      box-shadow: 0 8px 40px rgba(0,0,0,0.30);
      padding: 40px 36px;
    }

    .form-card h1 { font-size: 26px; font-weight: 800; color: #002855; margin-bottom: 6px; }
    .form-card .subtitle { font-size: 14px; color: #6b7a99; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: #002855; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #dde3f0; border-radius: 8px;
      font-size: 14px; color: #333;
      background: #f8f9ff; outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .form-group input:focus { border-color: #FF8200; background: #fff; }

    .btn-signin {
      width: 100%; padding: 14px;
      background: #FF8200; color: #fff;
      font-size: 16px; font-weight: 800;
      border: none; border-radius: 8px;
      cursor: pointer; transition: all 0.18s;
      margin-top: 6px; margin-bottom: 20px;
      box-shadow: 0 4px 18px rgba(255,130,0,0.42);
    }
    .btn-signin:hover { background: #e57200; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,130,0,0.52); }

    .form-alt { text-align: center; font-size: 14px; color: #6b7a99; }
    .form-alt a { color: #002855; font-weight: 700; text-decoration: none; }
    .form-alt a:hover { color: #FF8200; }

    .alert-danger {
      background: #fef2f2; border: 1px solid #fecaca;
      color: #b91c1c; border-radius: 8px;
      padding: 11px 14px; font-size: 14px; margin-bottom: 18px;
    }

    .back-link {
      display: block; text-align: center;
      margin-top: 20px; padding-top: 18px;
      border-top: 1px solid #eef0f6;
      font-size: 13px; color: #9ca3af;
      text-decoration: none; transition: color 0.15s;
    }
    .back-link:hover { color: #002855; }
  </style>
</head>
