    /* Very subtle right-side veil so white card reads cleanly */
    .page-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        100deg,
        transparent           0%,
        transparent          45%,
        rgba(255,255,255,0.10) 55%,
        rgba(255,255,255,0.25) 70%,
        rgba(255,255,255,0.35) 100%
      );
      z-index: 1;
    }

    /* Form floats over the right open area of the image */
    .form-wrap {
      position: absolute;
      top: 50%;
      right: 6%;
      transform: translateY(-50%);
      z-index: 2;
      width: 100%;
      max-width: 400px;
    }

    /* WINK branding above the card */
    .form-brand {
      text-align: center;
      margin-bottom: 14px;
    }
    .form-brand .wordmark {
      font-size: 36px; font-weight: 900;
      color: #002855; letter-spacing: -1px;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1;
      text-shadow: 0 1px 6px rgba(255,255,255,0.8);
    }
    .form-brand .brand-sub {
      font-size: 14px; font-weight: 700;
      color: #002855; opacity: 0.80;
      text-shadow: 0 1px 6px rgba(255,255,255,0.8);
    }

    .form-card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid rgba(200,215,240,0.60);
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      padding: 36px 32px;
    }

    .form-card h1 {
      font-size: 24px; font-weight: 800;
      color: #002855; margin-bottom: 5px;
    }
    .form-card .subtitle {
      font-size: 14px; color: #6b7a99;
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 13px;
      font-weight: 700; color: #002855; margin-bottom: 5px;
    }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #dde3f0; border-radius: 8px;
      font-size: 14px; color: #333;
      background: #f8f9ff; outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .form-group input:focus { border-color: #FF8200; background: #fff; }

    .btn-signin {
      width: 100%; padding: 13px;
      background: #FF8200; color: #fff;
      font-size: 16px; font-weight: 800;
      border: none; border-radius: 8px;
      cursor: pointer; transition: all 0.18s;
      margin-top: 4px; margin-bottom: 18px;
      box-shadow: 0 4px 18px rgba(255,130,0,0.40);
    }
    .btn-signin:hover { background: #e57200; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,130,0,0.50); }

    .form-alt { text-align: center; font-size: 14px; color: #6b7a99; }
    .form-alt a { color: #002855; font-weight: 700; text-decoration: none; }
    .form-alt a:hover { color: #FF8200; }

    .alert-danger {
      background: #fef2f2; border: 1px solid #fecaca;
      color: #b91c1c; border-radius: 8px;
      padding: 10px 14px; font-size: 14px; margin-bottom: 16px;
    }

    .back-link {
      display: block; text-align: center;
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid #eef0f6;
      font-size: 13px; color: #9ca3af;
      text-decoration: none; transition: color 0.15s;
    }
    .back-link:hover { color: #002855; }
  </style>
</head>
<body>

  <div class="page-bg"></div>
  <div class="page-overlay"></div>

  <div class="form-wrap">

    <!-- WINK branding above card -->
    <div class="form-brand">
      <div class="wordmark">WINK</div>
      <div class="brand-sub">(What I Need to Know)</div>
    </div>

    <div class="form-card">
      <h1>Welcome back 👋</h1>
      <div class="subtitle">Sign in with your email to continue.</div>

      {% if error %}
        <div class="alert-danger">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email"
                 placeholder="yourname@miners.utep.edu" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Your password" required>
        </div>
        <button type="submit" class="btn-signin">Sign In →</button>
      </form>

      <div class="form-alt">
        Don't have an account? <a href="/register">Create one for free</a>
      </div>

      <a href="/" class="back-link">← Back to home</a>
    </div>

  </div>

</body>
</html>
